<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drift — Cinematic Experience</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ── Theme Variables ── */
:root {
  --bg:       #050508;
  --surface:  rgba(14, 14, 26, 0.6);
  --surface2: rgba(19, 19, 31, 0.8);
  --border:   rgba(255, 255, 255, 0.1);
  --border2:  rgba(255, 255, 255, 0.2);
  --accent:   #c9a84c; 
  --accent2:  #f0c96a;
  --teal:     #3ecfbf;
  --rose:     #e06b8a;
  --txt:      #ffffff;
  --muted:    #8b88a0;
  --danger:   #ff4b4b;
  --r:        16px;
  --fh:       'Syne', sans-serif;
  --fm:       'Space Mono', monospace;
  --blur:     blur(16px);
}

/* Theme Classes */
body.theme-neon { --accent: #00f2ff; --accent2: #70ffff; --bg: #000810; }
body.theme-crimson { --accent: #ff2a55; --accent2: #ff708f; --bg: #100005; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; background: var(--bg); color: var(--txt);
  font-family: var(--fh); font-size: 15px; overflow: hidden;
  transition: background 0.5s ease;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* ── Cinematic Backgrounds ── */
.mesh {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(circle at 50% 50%, rgba(20,20,30,0.5) 0%, var(--bg) 100%);
}
.grain {
  position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: .15;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
}

/* ── Layout ── */
#app {
  position: relative; z-index: 2; height: 100vh; width: 100vw;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}

.screen { display: none; width: 100%; height: 100%; }
.screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

/* ── Reusable Glass Panels ── */
.glass-panel {
  background: var(--surface); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--border); border-radius: var(--r); padding: 32px;
  width: 100%; max-width: 480px; box-shadow: 0 24px 48px rgba(0,0,0,0.4);
}

/* ── UI Elements ── */
.logo { font-size: 3.5rem; font-weight: 800; letter-spacing: -.05em; line-height: 1; margin-bottom: 8px; text-align: center; }
.logo span { color: var(--accent); transition: color 0.3s ease; }
.tagline { font-family: var(--fm); font-size: .75rem; letter-spacing: .15em; color: var(--muted); text-align: center; text-transform: uppercase; margin-bottom: 40px; }

.status-badge {
  display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px; border-radius: 99px;
  font-family: var(--fm); font-size: .7rem; letter-spacing: .08em; text-transform: uppercase;
  border: 1px solid var(--border); background: rgba(0,0,0,0.3); margin: 0 auto 32px;
}
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: all .3s; }
.status-badge.online .status-dot { background: var(--teal); box-shadow: 0 0 10px var(--teal); }
.status-badge.offline .status-dot { background: var(--rose); box-shadow: 0 0 10px var(--rose); }

.server-row { display: flex; gap: 10px; margin-bottom: 24px; }
.server-row input {
  flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--border2); border-radius: 12px;
  padding: 12px 16px; color: var(--txt); font-family: var(--fm); font-size: .8rem; outline: none; transition: all .2s;
}
.server-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(255,255,255,0.05); }

.interest-label { font-family: var(--fm); font-size: .7rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.interest-box {
  background: rgba(0,0,0,0.3); border: 1px solid var(--border2); border-radius: 12px; padding: 12px;
  min-height: 60px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; cursor: text; transition: all .2s; margin-bottom: 32px; position: relative;
}
.interest-box:focus-within { border-color: var(--accent); }
.interest-placeholder { position: absolute; left: 16px; pointer-events: none; font-family: var(--fm); font-size: .8rem; color: var(--muted); }
.interest-placeholder.hidden { display: none; }
.tag {
  background: rgba(255,255,255,0.1); border: 1px solid var(--border); color: var(--txt); border-radius: 8px;
  padding: 6px 12px; font-size: .8rem; font-weight: 600; display: flex; align-items: center; gap: 6px; cursor: pointer; transition: all .2s;
}
.tag:hover { background: rgba(255,255,255,0.2); border-color: var(--danger); color: var(--danger); }
.interest-input { background: transparent; border: none; outline: none; font-family: var(--fh); font-size: .9rem; color: var(--txt); min-width: 100px; flex: 1; }

.btns { display: flex; gap: 16px; }
.btn {
  flex: 1; padding: 16px; border-radius: 12px; font-family: var(--fh); font-size: 1rem; font-weight: 700;
  cursor: pointer; border: none; transition: all .3s ease; position: relative; overflow: hidden;
}
.btn-primary { background: var(--accent); color: #000; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
.btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,255,255,0.2); background: var(--accent2); }
.btn-outline { background: rgba(255,255,255,0.05); border: 1px solid var(--border2); color: var(--txt); }
.btn-outline:hover:not(:disabled) { background: rgba(255,255,255,0.1); border-color: var(--txt); }
.btn:disabled { opacity: .3; cursor: not-allowed; }

/* ── Video Area ── */
.video-area { position: absolute; inset: 0; z-index: 0; background: #000; overflow: hidden; }
.video-area.hidden { display: none; }
#remoteVideo { width: 100vw; height: 100vh; object-fit: cover; }

/* Local PIP - Local preview is mirrored purely visually */
.local-pip {
  position: absolute; top: 24px; left: 24px; width: 240px; aspect-ratio: 4/3; border-radius: 16px;
  overflow: hidden; border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 12px 32px rgba(0,0,0,0.6); z-index: 10;
}
#localVideo { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); } 

/* ── Chat Overlay ── */
.chat-container {
  position: absolute; bottom: 24px; left: 24px; width: 360px; max-height: calc(100vh - 250px);
  display: flex; flex-direction: column; background: linear-gradient(180deg, rgba(10,10,15,0.2) 0%, rgba(10,10,15,0.8) 100%);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid var(--border); border-radius: 20px;
  z-index: 10; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}
.chat-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); }
.chat-logo { font-weight: 800; font-size: 1.2rem; color: var(--accent); }
.chat-status { font-family: var(--fm); font-size: .7rem; letter-spacing: .05em; color: var(--teal); text-transform: uppercase; }
.chat-body {
  flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px;
  mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent); -webkit-mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
}

.msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: .9rem; line-height: 1.4; word-break: break-word; }
.msg.you { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 4px; font-weight: 600; }
.msg.stranger { align-self: flex-start; background: rgba(255,255,255,0.1); border: 1px solid var(--border2); color: var(--txt); border-bottom-left-radius: 4px; }
.msg.system { align-self: center; background: transparent; color: var(--muted); font-family: var(--fm); font-size: .7rem; border: 1px solid var(--border); border-radius: 99px; padding: 6px 14px; }

.chat-input-bar { padding: 16px; display: flex; gap: 10px; background: rgba(0,0,0,0.4); border-top: 1px solid var(--border); }
.chat-input-bar textarea {
  flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border2); border-radius: 12px;
  padding: 12px; color: var(--txt); font-family: var(--fh); font-size: .9rem; resize: none; height: 48px; outline: none; transition: border 0.2s;
}
.chat-input-bar textarea:focus { border-color: var(--accent); }
.send-btn { width: 48px; height: 48px; border-radius: 12px; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
.send-btn:hover { transform: scale(1.05); }
.send-btn svg { fill: #000; width: 20px; }

/* ── Core Controls ── */
.core-controls { position: absolute; bottom: 24px; right: 24px; display: flex; gap: 16px; z-index: 20; }
.core-btn {
  padding: 16px 24px; border-radius: 99px; font-family: var(--fh); font-size: 1rem; font-weight: 700;
  cursor: pointer; border: none; backdrop-filter: var(--blur); box-shadow: 0 8px 24px rgba(0,0,0,0.4); transition: all 0.2s;
}
.core-btn.next { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: var(--txt); }
.core-btn.next:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
.core-btn.end { background: rgba(255,75,75,0.15); border: 1px solid rgba(255,75,75,0.3); color: var(--danger); }
.core-btn.end:hover { background: rgba(255,75,75,0.3); transform: translateY(-2px); }

/* ── Mode Toggle & Expert Panel ── */
.mode-toggle-wrapper { position: absolute; top: 24px; right: 24px; z-index: 30; display: none; }
#screen-chat.active .mode-toggle-wrapper { display: block; }
.mode-btn {
  background: rgba(0,0,0,0.5); backdrop-filter: var(--blur); border: 1px solid var(--border2);
  color: var(--txt); padding: 10px 20px; border-radius: 99px; font-family: var(--fm); font-size: .8rem;
  cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px;
}
.mode-btn.expert-active { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 15px rgba(255,255,255,0.1); }

.expert-panel {
  position: absolute; top: 70px; right: 0; width: 320px; background: var(--surface2); backdrop-filter: var(--blur);
  border: 1px solid var(--border); border-radius: 16px; padding: 24px; opacity: 0; pointer-events: none; transform: translateY(-10px);
  transition: all 0.3s ease; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}
.expert-panel.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
.expert-section { margin-bottom: 20px; }
.expert-title { font-family: var(--fm); font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }

.expert-select { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border2); color: var(--txt); padding: 10px; border-radius: 8px; font-family: var(--fm); font-size: .8rem; outline: none; }
.expert-filters { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.filter-btn { background: rgba(255,255,255,0.05); border: 1px solid transparent; color: var(--txt); padding: 8px; border-radius: 8px; cursor: pointer; font-family: var(--fh); font-size: .8rem; transition: 0.2s; }
.filter-btn:hover, .filter-btn.active { background: rgba(255,255,255,0.15); border-color: var(--accent); color: var(--accent); }

.toggle-row { display: flex; align-items: center; justify-content: space-between; font-family: var(--fh); font-size: .9rem; margin-bottom: 10px; }
.switch { position: relative; display: inline-block; width: 44px; height: 24px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.1); transition: .4s; border-radius: 24px; border: 1px solid var(--border2); }
.slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: var(--muted); transition: .4s; border-radius: 50%; }
input:checked + .slider { background-color: rgba(255,255,255,0.2); border-color: var(--accent); }
input:checked + .slider:before { transform: translateX(20px); background-color: var(--accent); box-shadow: 0 0 10px var(--accent); }

.connecting-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; font-family: var(--fm); font-size: .8rem; color: var(--accent); text-transform: uppercase; z-index: 5; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.connecting-overlay.visible { opacity: 1; pointer-events: auto; }

.pulse-ring { width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--accent); margin: 0 auto 40px; position: relative; display: flex; align-items: center; justify-content: center; animation: pulse 2s ease-in-out infinite; }
.pulse-ring::before, .pulse-ring::after { content: ''; position: absolute; inset: -20px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); animation: pulseRipple 2s ease-in-out infinite; }
.pulse-ring::after { inset: -40px; animation-delay: .4s; }
.pulse-icon { font-size: 2.5rem; }
@keyframes pulse { 0%,100% { border-color: rgba(255,255,255,0.3); } 50% { border-color: var(--accent); box-shadow: 0 0 40px rgba(255,255,255,0.1); } }
@keyframes pulseRipple { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: .4; } }

.typing-indicator { display: none; padding: 10px 20px; font-family: var(--fm); font-size: 0.7rem; color: var(--accent); }
.typing-indicator.visible { display: block; }
</style>
</head>
<body>

<div class="mesh"></div>
<div class="grain"></div>

<div id="app">

  <div id="screen-home" class="screen active">
    <div class="glass-panel">
      <div class="logo">dr<span>i</span>ft</div>
      <div class="tagline">Cinematic Encounters</div>
      <div style="text-align: center;">
        <div id="statusBadge" class="status-badge offline">
          <div class="status-dot"></div><span id="statusText">Offline Mode</span>
        </div>
      </div>
      <div class="server-row">
        <input id="serverUrl" type="text" placeholder="ws://localhost:3000" value="ws://localhost:3000">
        <button class="btn btn-outline" style="flex: 0 0 auto; padding: 12px 20px;" onclick="App.reconnect()">Connect</button>
      </div>
      <div class="interest-label">Your Vibes</div>
      <div class="interest-box" id="interestBox" onclick="document.getElementById('interestInput').focus()">
        <span class="interest-placeholder" id="interestPlaceholder">gaming, art, lofi...</span>
        <input id="interestInput" class="interest-input" type="text" placeholder="" maxlength="32" onkeydown="App.interestKey(event)" oninput="App.interestInput(event)">
      </div>
      <div class="btns">
        <button class="btn btn-outline" id="btnText" onclick="App.start('text')" disabled>Text Only</button>
        <button class="btn btn-primary" id="btnVideo" onclick="App.start('video')" disabled>Enter Drift</button>
      </div>
    </div>
  </div>

  <div id="screen-search" class="screen">
    <div class="pulse-ring"><span class="pulse-icon">👁️</span></div>
    <div style="font-size: 2rem; font-weight: 700; margin-bottom: 12px;">Drifting...</div>
    <div class="tagline" id="searchSub" style="margin-bottom: 40px;">Finding connection</div>
    <button class="btn btn-outline" style="width: 200px; border-color: var(--danger); color: var(--danger);" onclick="App.stop()">Abort</button>
  </div>

  <div id="screen-chat" class="screen">
    
    <div class="video-area hidden" id="videoArea">
      <video id="remoteVideo" autoplay playsinline></video>
      <div class="connecting-overlay visible" id="connectingOverlay">Establishing Link...</div>
    </div>

    <video id="rawLocalVideo" autoplay playsinline muted style="display:none;"></video>
    <canvas id="fxCanvas" style="display:none;"></canvas>

    <div class="local-pip" id="localPipContainer" style="display:none;">
      <video id="localVideo" autoplay playsinline muted></video>
    </div>

    <div class="mode-toggle-wrapper">
      <button class="mode-btn" id="expertToggleBtn">Easy Mode</button>
      <div class="expert-panel" id="expertPanel">
        <div class="expert-section">
          <div class="expert-title">Camera Source</div>
          <select class="expert-select" id="cameraSelect"><option value="default">Default Camera</option></select>
        </div>
        <div class="expert-section">
          <div class="expert-title">Cinematic Color Filters</div>
          <div class="expert-filters">
            <button class="filter-btn active" data-filter="none">Normal</button>
            <button class="filter-btn" data-filter="sepia">Vintage</button>
            <button class="filter-btn" data-filter="grayscale">Noir</button>
            <button class="filter-btn" data-filter="cyber">Cyber</button>
          </div>
        </div>
        <div class="expert-section">
          <div class="toggle-row">
            <span>Face Tracking (Zoom)</span>
            <label class="switch"><input type="checkbox" id="zoomToggle"><span class="slider"></span></label>
          </div>
          <div class="toggle-row">
            <span>Noise Reduction (Soft)</span>
            <label class="switch"><input type="checkbox" id="softToggle"><span class="slider"></span></label>
          </div>
        </div>
        <div class="expert-section">
          <div class="expert-title">Interface Theme</div>
          <div class="expert-filters" style="grid-template-columns: 1fr 1fr 1fr;">
            <button class="filter-btn active" data-theme="default">Gold</button>
            <button class="filter-btn" data-theme="theme-neon">Neon</button>
            <button class="filter-btn" data-theme="theme-crimson">Crimson</button>
          </div>
        </div>
      </div>
    </div>

    <div class="chat-container">
      <div class="chat-header">
        <div class="chat-logo">drift</div>
        <div class="chat-status" id="chatStatus">Connected</div>
      </div>
      <div class="chat-body" id="chatBody"></div>
      <div class="typing-indicator" id="typingIndicator">Stranger is typing...</div>
      <div class="chat-input-bar">
        <textarea id="msgInput" placeholder="Send a message..." onkeydown="App.msgKey(event)" oninput="App.onTyping()"></textarea>
        <button class="send-btn" onclick="App.sendMsg()"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button>
      </div>
    </div>

    <div class="core-controls">
      <button class="core-btn end" onclick="App.stop()">Leave</button>
      <button class="core-btn next" onclick="App.skip()">Next ⏩</button>
    </div>

  </div>
</div>

<script>
'use strict';

// ─── STATE & CONFIG ─────────────────────────────────────────────────────────
const STATE = {
  screen:      'home',
  chatType:    'text',
  ws:          null,
  interests:   [],
  isOnline:    false,
  isOfferer:   false,
  rawStream:   null, // The unedited camera feed
  localStream: null, // The processed canvas stream sent to peer
  pc:          null,
  connId:      null,
  typingTimer: null,
  isTyping:    false,
  serverUrl:   localStorage.getItem('drift_server') || 'ws://localhost:3000',
};

let reconnectLock = false;
const ICE_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }];
const $ = id => document.getElementById(id);

// ─── CANVAS EFFECTS PIPELINE (SENT TO PEER) ─────────────────────────────────
const FX = { filter: 'none', zoom: false, soft: false, faceX: 0.5, faceY: 0.5, targetFaceX: 0.5, targetFaceY: 0.5 };
let isProcessing = false;
const faceDetector = window.FaceDetector ? new FaceDetector() : null;
let lastDetect = 0;

function startCanvasPipeline() {
  if (isProcessing) return;
  isProcessing = true;
  const rawVid = $('rawLocalVideo');
  const cvs = $('fxCanvas');
  const ctx = cvs.getContext('2d');

  function render() {
    if (!STATE.rawStream) { isProcessing = false; return; }
    if (rawVid.videoWidth === 0) { requestAnimationFrame(render); return; }

    cvs.width = rawVid.videoWidth;
    cvs.height = rawVid.videoHeight;

    // Face detection for tracking (if available, else centers)
    if (FX.zoom && faceDetector && performance.now() - lastDetect > 200) {
      lastDetect = performance.now();
      faceDetector.detect(rawVid).then(faces => {
        if (faces.length > 0) {
          const f = faces[0].boundingBox;
          FX.targetFaceX = (f.x + f.width / 2) / cvs.width;
          FX.targetFaceY = (f.y + f.height / 2) / cvs.height;
        } else {
          FX.targetFaceX = 0.5; FX.targetFaceY = 0.5;
        }
      }).catch(()=>{});
    } else if (!FX.zoom) {
      FX.targetFaceX = 0.5; FX.targetFaceY = 0.5;
    }

    // Smooth movement
    FX.faceX += (FX.targetFaceX - FX.faceX) * 0.08;
    FX.faceY += (FX.targetFaceY - FX.faceY) * 0.08;

    ctx.save();

    // Fix applied here: Use positive scale to avoid flipping the image!
    if (FX.zoom) {
      const scale = 1.6;
      ctx.translate(cvs.width/2, cvs.height/2);
      ctx.scale(scale, scale);
      const panX = (0.5 - FX.faceX) * cvs.width;
      const panY = (0.5 - FX.faceY) * cvs.height;
      ctx.translate(-cvs.width/2 + panX, -cvs.height/2 + panY);
    }

    // Build the native Canvas Filter
    let filterStr = '';
    if (FX.filter === 'sepia') filterStr += 'sepia(80%) contrast(110%) ';
    if (FX.filter === 'grayscale') filterStr += 'grayscale(100%) contrast(120%) ';
    if (FX.filter === 'cyber') filterStr += 'hue-rotate(90deg) saturate(200%) contrast(120%) ';

    // Soft & Sharpen trick: Slight blur to kill grain, high contrast to rebuild edges
    if (FX.soft) filterStr += 'blur(0.8px) contrast(1.25) saturate(1.1) brightness(0.95) ';

    if (filterStr) ctx.filter = filterStr.trim();

    ctx.drawImage(rawVid, 0, 0, cvs.width, cvs.height);
    ctx.restore();
    requestAnimationFrame(render);
  }
  render();
}

// ─── WEBRTC REWRITE TO USE CANVAS STREAM ─────────────────────────────────────
async function initVideo() {
  try {
    STATE.rawStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    
    // 1. Feed raw camera to hidden video element
    $('rawLocalVideo').srcObject = STATE.rawStream;
    
    // 2. Start drawing to canvas
    startCanvasPipeline();

    // 3. Extract the processed video track from canvas + audio from raw mic
    const canvasStream = $('fxCanvas').captureStream(30); // 30 FPS
    STATE.localStream = new MediaStream([
      canvasStream.getVideoTracks()[0], 
      STATE.rawStream.getAudioTracks()[0]
    ]);

    // Show processed stream in PIP
    $('localVideo').srcObject = STATE.localStream;
  } catch(e) {
    console.error(e);
    addSystemMsg('No camera/mic access.');
  }

  STATE.pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  if (STATE.localStream) {
    STATE.localStream.getTracks().forEach(t => STATE.pc.addTrack(t, STATE.localStream));
  }

  STATE.pc.ontrack = e => {
    $('remoteVideo').srcObject = e.streams[0];
    $('connectingOverlay').classList.remove('visible');
  };
  STATE.pc.onicecandidate = e => {
    if (e.candidate) wsSend({ event: 'ice', candidate: e.candidate });
  };
}

async function makeOffer() {
  const offer = await STATE.pc.createOffer();
  await STATE.pc.setLocalDescription(offer);
  wsSend({ event: 'offer', offer: STATE.pc.localDescription });
}
async function handleOffer(offer) {
  await STATE.pc.setRemoteDescription(new RTCSessionDescription(offer));
  const answer = await STATE.pc.createAnswer();
  await STATE.pc.setLocalDescription(answer);
  wsSend({ event: 'answer', answer: STATE.pc.localDescription });
}

function cleanupPeer() {
  if (STATE.pc) { try { STATE.pc.close(); } catch {} STATE.pc = null; }
  if (STATE.rawStream) { STATE.rawStream.getTracks().forEach(t => t.stop()); STATE.rawStream = null; }
  $('remoteVideo').srcObject = null;
  $('localVideo').srcObject = null;
  $('rawLocalVideo').srcObject = null;
  STATE.connId = null; STATE.isOfferer = false;
}

// ─── ORIGINAL SOCKET LOGIC (Untouched core logic) ───────────────────────────
function showScreen(name) {
  STATE.screen = name;
  ['screen-home', 'screen-search', 'screen-chat'].forEach(id => $(id).classList.remove('active'));
  $( `screen-${name}` ).classList.add('active');
}

function setStatus(online, text) {
  STATE.isOnline = online;
  $('statusBadge').className = 'status-badge ' + (online ? 'online' : 'offline');
  $('statusText').textContent = text;
  $('btnText').disabled = !online; $('btnVideo').disabled = !online;
}

function connect(url) {
  if (reconnectLock) return;
  reconnectLock = true;
  if (STATE.ws) { try { STATE.ws.close(); } catch {} STATE.ws = null; }
  try {
    const ws = new WebSocket(url);
    STATE.ws = ws;
    ws.onopen = () => { reconnectLock = false; localStorage.setItem('drift_server', url); setStatus(true, 'Connected'); };
    ws.onmessage = e => { try { handleServerMsg(JSON.parse(e.data)); } catch {} };
    ws.onclose = () => { setStatus(false, 'Offline Mode'); STATE.ws = null; if (STATE.screen !== 'home') setTimeout(() => connect(url), 2000); };
    ws.onerror = () => { setStatus(false, 'Offline Mode'); };
  } catch (e) { reconnectLock = false; setStatus(false, 'Offline Mode'); }
}
function wsSend(obj) { if (STATE.ws?.readyState === WebSocket.OPEN) STATE.ws.send(JSON.stringify(obj)); }

async function handleServerMsg(msg) {
  switch (msg.event) {
    case 'searching': $('searchSub').textContent = `Position in queue: ${msg.position || '?'}`; break;
    case 'matched':
      STATE.connId = msg.connId; STATE.isOfferer = msg.offerer;
      switchToChatUI();
      if (STATE.chatType === 'video') { await initVideo(); if (STATE.isOfferer) await makeOffer(); }
      else { addSystemMsg('✨ Connected! Say hi.'); }
      break;
    case 'offer': if (STATE.chatType === 'video') await handleOffer(msg.offer); break;
    case 'answer': if (STATE.pc) await STATE.pc.setRemoteDescription(new RTCSessionDescription(msg.answer)); break;
    case 'ice': if (STATE.pc && msg.candidate) { try { await STATE.pc.addIceCandidate(new RTCIceCandidate(msg.candidate)); } catch {} } break;
    case 'message': addMsg('stranger', msg.text); break;
    case 'typing': $('typingIndicator').classList.add('visible'); break;
    case 'stop_typing': $('typingIndicator').classList.remove('visible'); break;
    case 'peer_left': addSystemMsg('Stranger disconnected.'); cleanupPeer(); break;
    case 'stopped': goHome(false); break;
  }
}

function switchToChatUI() {
  showScreen('chat');
  $('chatBody').innerHTML = '';
  $('chatStatus').textContent = 'Connected';
  const video = STATE.chatType === 'video';
  $('videoArea').classList.toggle('hidden', !video);
  $('localPipContainer').style.display = video ? 'block' : 'none';
  addSystemMsg('✨ Connected! Say hi.');
}

function addMsg(from, text) {
  const div = document.createElement('div'); div.className = `msg ${from}`; div.textContent = text;
  $('chatBody').appendChild(div); $('chatBody').scrollTop = $('chatBody').scrollHeight;
}
function addSystemMsg(text) {
  const div = document.createElement('div'); div.className = 'msg system'; div.textContent = text;
  $('chatBody').appendChild(div); $('chatBody').scrollTop = $('chatBody').scrollHeight;
}
function goHome(sendStop = true) {
  cleanupPeer(); if (sendStop) wsSend({ event: 'stop' }); showScreen('home');
}

const App = {
  init() { connect(STATE.serverUrl); },
  reconnect() { const url = $('serverUrl').value.trim(); if(url) connect(url); },
  start(type) {
    if (!STATE.isOnline) return;
    STATE.chatType = type;
    STATE.interests = [...document.querySelectorAll('.tag')].map(t => t.dataset.val);
    showScreen('search');
    wsSend({ event: 'search', chatType: type, interests: STATE.interests });
  },
  stop() { goHome(); },
  skip() { cleanupPeer(); wsSend({ event: 'skip', chatType: STATE.chatType, interests: STATE.interests }); },
  sendMsg() {
    const input = $('msgInput'); const text = input.value.trim(); if (!text) return;
    wsSend({ event: 'message', text }); addMsg('you', text); input.value = ''; wsSend({ event: 'stop_typing' });
  },
  msgKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.sendMsg(); } },
  onTyping() {
    if (!STATE.isTyping) { STATE.isTyping = true; wsSend({ event: 'typing' }); }
    clearTimeout(STATE.typingTimer);
    STATE.typingTimer = setTimeout(() => { STATE.isTyping = false; wsSend({ event: 'stop_typing' }); }, 2000);
  },
  interestKey(e) {
    if(e.key === 'Enter') {
      e.preventDefault(); const val = e.target.value.trim();
      if(val) {
        const tag = document.createElement('div'); tag.className = 'tag'; tag.dataset.val = val;
        tag.innerHTML = `${val} <span onclick="this.parentElement.remove(); App.updatePlaceholder()">×</span>`;
        $('interestBox').insertBefore(tag, $('interestInput')); e.target.value = ''; this.updatePlaceholder();
      }
    }
  },
  interestInput() { this.updatePlaceholder(); },
  updatePlaceholder() { $('interestPlaceholder').classList.toggle('hidden', document.querySelectorAll('.tag').length > 0 || $('interestInput').value.length > 0); }
};
window.App = App; window.addEventListener('DOMContentLoaded', () => App.init());

// ─── EXPERT UI CONTROLS ───────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const toggleBtn = $('expertToggleBtn'); const panel = $('expertPanel');
  
  toggleBtn.addEventListener('click', () => {
    const isExpert = panel.classList.toggle('visible');
    toggleBtn.textContent = isExpert ? 'Expert Mode' : 'Easy Mode';
    toggleBtn.classList.toggle('expert-active', isExpert);
  });

  // Mutates the global FX object used by Canvas
  document.querySelectorAll('.expert-filters button[data-filter]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      document.querySelectorAll('.expert-filters button[data-filter]').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      FX.filter = e.target.getAttribute('data-filter');
    });
  });

  document.querySelectorAll('.expert-filters button[data-theme]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      document.querySelectorAll('.expert-filters button[data-theme]').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      document.body.className = '';
      if(e.target.getAttribute('data-theme') !== 'default') document.body.classList.add(e.target.getAttribute('data-theme'));
    });
  });

  $('zoomToggle').addEventListener('change', e => FX.zoom = e.target.checked);
  $('softToggle').addEventListener('change', e => FX.soft = e.target.checked);

  // Camera Switcher - Updates the RAW stream only, Canvas keeps rendering safely!
  $('cameraSelect').addEventListener('change', async (e) => {
    try {
      const newStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: e.target.value } }, audio: true });
      if (STATE.rawStream) STATE.rawStream.getTracks().forEach(t => t.stop());
      STATE.rawStream = newStream;
      $('rawLocalVideo').srcObject = newStream;
    } catch(err) { console.error("Switch err:", err); }
  });

  new MutationObserver(muts => {
    muts.forEach(m => {
      if (m.target.classList.contains('active') && m.target.id === 'screen-chat') {
        navigator.mediaDevices.enumerateDevices().then(devices => {
          const vids = devices.filter(d => d.kind === 'videoinput');
          if(vids.length) {
            $('cameraSelect').innerHTML = '';
            vids.forEach((d, i) => {
              const opt = document.createElement('option'); opt.value = d.deviceId; opt.text = d.label || `Cam ${i+1}`;
              $('cameraSelect').appendChild(opt);
            });
          }
        });
      }
    });
  }).observe($('screen-chat'), { attributes: true, attributeFilter: ['class'] });
});
</script>
</body>
